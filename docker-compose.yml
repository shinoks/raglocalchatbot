services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    gpus: all
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama

  ollama-embed:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - ollama
      - ollama-embed
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./storage/uploads:/data/uploads

  worker:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    env_file:
      - .env
    command: ["python", "-m", "app.workers.run_worker"]
    depends_on:
      - postgres
      - redis
      - ollama
      - ollama-embed
      - api
    volumes:
      - ./storage/uploads:/data/uploads

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
    depends_on:
      - api
    ports:
      - "4173:80"

  widget:
    build:
      context: .
      dockerfile: apps/widget/Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"

  site:
    build:
      context: .
      dockerfile: apps/site/Dockerfile
    depends_on:
      - api
      - widget
    ports:
      - "3000:80"

volumes:
  pgdata:
  ollama:



